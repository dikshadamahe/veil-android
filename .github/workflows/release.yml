name: APK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and publish'
        required: true
        default: 'v0.1.0-mvp'

permissions:
  contents: write

jobs:
  build-release:
    name: Build apk_release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      ORACLE_URL: ${{ vars.ORACLE_URL || secrets.ORACLE_URL }}
      TMDB_TOKEN: ${{ secrets.TMDB_TOKEN || secrets.TMDB_READ_TOKEN || vars.TMDB_TOKEN || vars.TMDB_READ_TOKEN }}
      WYZIE_API_KEY: ${{ secrets.WYZIE_API_KEY }}
      OPENSUBTITLES_API_KEY: ${{ secrets.OPENSUBTITLES_API_KEY }}
      OPENSUBTITLES_USERNAME: ${{ secrets.OPENSUBTITLES_USERNAME }}
      OPENSUBTITLES_PASSWORD: ${{ secrets.OPENSUBTITLES_PASSWORD }}

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Same as local release prep (`dart run flutter_launcher_icons`): keeps
      # mipmap/adaptive assets in sync with `logo-circle.png` without relying
      # on pre-generated binaries in the tag ref.
      - name: Generate Android launcher icons
        run: dart run flutter_launcher_icons

      - name: Validate release secrets
        run: |
          if [ -z "${TMDB_TOKEN}" ]; then
            echo "Missing GitHub secret or variable: TMDB_TOKEN or TMDB_READ_TOKEN"
            exit 1
          fi
          if [ -z "${ORACLE_URL}" ]; then
            echo "Missing GitHub Actions variable or secret: ORACLE_URL"
            echo "Set ORACLE_URL to your public providers-api base URL (e.g. http://YOUR_ORACLE_IP:3001)."
            echo "Without it, the release APK defaults to http://127.0.0.1:3001 and scraping will not work on devices."
            exit 1
          fi

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "::error::Release signing secrets are missing. Required: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
            echo "Without a stable upload keystore, in-app updates cannot install on top of previous APKs."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
          printf '%s\n' \
            "storePassword=$ANDROID_KEYSTORE_PASSWORD" \
            "keyPassword=$ANDROID_KEY_PASSWORD" \
            "keyAlias=$ANDROID_KEY_ALIAS" \
            "storeFile=../upload-keystore.jks" \
            > android/key.properties

      - name: Analyze
        run: flutter analyze

      # Mirrors local: flutter build apk --release \
      #   --dart-define=ORACLE_URL=...   (base URL with or without :3001)
      #   --dart-define=TMDB_TOKEN=...
      - name: Build APK
        run: |
          BUILD_ARGS=(
            "build"
            "apk"
            "--release"
            "--dart-define=ORACLE_URL=${ORACLE_URL}"
            "--dart-define=TMDB_TOKEN=${TMDB_TOKEN}"
          )
          if [ -n "${WYZIE_API_KEY}" ]; then
            BUILD_ARGS+=("--dart-define=WYZIE_API_KEY=${WYZIE_API_KEY}")
          fi
          if [ -n "${OPENSUBTITLES_API_KEY}" ]; then
            BUILD_ARGS+=("--dart-define=OPENSUBTITLES_API_KEY=${OPENSUBTITLES_API_KEY}")
          fi
          if [ -n "${OPENSUBTITLES_USERNAME}" ]; then
            BUILD_ARGS+=("--dart-define=OPENSUBTITLES_USERNAME=${OPENSUBTITLES_USERNAME}")
          fi
          if [ -n "${OPENSUBTITLES_PASSWORD}" ]; then
            BUILD_ARGS+=("--dart-define=OPENSUBTITLES_PASSWORD=${OPENSUBTITLES_PASSWORD}")
          fi

          flutter "${BUILD_ARGS[@]}"

      - name: Prepare release artifacts
        id: artifacts
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}')
          VERSION_NAME="${VERSION_LINE%%+*}"
          VERSION_CODE="${VERSION_LINE##*+}"
          TAG_NAME="${RELEASE_TAG}"
          if [[ "$TAG_NAME" != v* ]]; then
            TAG_NAME="v${VERSION_NAME}"
          fi

          mkdir -p dist
          # Single APK asset named after the release tag (e.g. veil-v3.0.3.apk).
          # Do not also upload a generic veil.apk — that duplicated the same file.
          APK_NAME="veil-${TAG_NAME}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "dist/${APK_NAME}"
          SHA256=$(sha256sum "dist/${APK_NAME}" | awk '{print $1}')
          RELEASED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          VERSION_NAME="$VERSION_NAME" \
          VERSION_CODE="$VERSION_CODE" \
          TAG_NAME="$TAG_NAME" \
          APK_NAME="$APK_NAME" \
          SHA256="$SHA256" \
          RELEASED_AT="$RELEASED_AT" \
          GITHUB_REPOSITORY="${{ github.repository }}" \
          python3 - <<'PY'
          import json, os
          payload = {
            "versionName": os.environ["VERSION_NAME"],
            "versionCode": int(os.environ["VERSION_CODE"]),
            "tag": os.environ["TAG_NAME"],
            "apkUrl": (
              f"https://github.com/{os.environ['GITHUB_REPOSITORY']}"
              f"/releases/download/{os.environ['TAG_NAME']}/{os.environ['APK_NAME']}"
            ),
            "sha256": os.environ["SHA256"],
            "mandatory": False,
            "minVersionCode": 1,
            "releasedAt": os.environ["RELEASED_AT"],
          }
          with open("dist/version.json", "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2)
              handle.write("\n")
          PY

          {
            echo "version_name=$VERSION_NAME"
            echo "version_code=$VERSION_CODE"
            echo "tag_name=$TAG_NAME"
            echo "apk_name=$APK_NAME"
            echo "sha256=$SHA256"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifacts.outputs.tag_name }}
          name: Veil ${{ steps.artifacts.outputs.version_name }}
          generate_release_notes: true
          prerelease: false
          body: |
            ## Veil ${{ steps.artifacts.outputs.version_name }}

            - **versionCode:** `${{ steps.artifacts.outputs.version_code }}`
            - **APK:** `${{ steps.artifacts.outputs.apk_name }}`
            - **APK SHA-256:** `${{ steps.artifacts.outputs.sha256 }}`

            Install over any previous release signed with the same upload keystore.
            Builds that include in-app updates will detect this release automatically via `version.json`.
          files: |
            dist/${{ steps.artifacts.outputs.apk_name }}
            dist/version.json
