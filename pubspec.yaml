name: pstream_android
description: "Flutter Android streaming aggregator for PStream."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  media_kit: ^1.1.11
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  hive_flutter: ^1.1.0
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  google_fonts: ^6.3.2
  flutter_adaptive_scaffold: ^0.3.3+1
  http: ^1.5.0
  dio: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
